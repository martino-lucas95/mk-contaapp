version: '3.8'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: contaapp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: contaapp
      POSTGRES_PASSWORD: contaapp_secret
      POSTGRES_DB: contaapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contaapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend NestJS ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: contaapp_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: contaapp
      DB_PASSWORD: contaapp_secret
      DB_NAME: contaapp
      JWT_SECRET: dev_jwt_secret_change_in_prod
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: dev_refresh_secret_change_in_prod
      JWT_REFRESH_EXPIRES_IN: 30d
      ENCRYPTION_KEY: "contaapp_dev_key_32bytes_padded!!"
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src   # hot-reload en dev
    command: npm run start:dev

  # ── Frontend React ──────────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: contaapp_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src  # hot-reload en dev

volumes:
  postgres_data:
